<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NutriApp - Système de recommandation nutritionnelle intelligent avec validation par des nutritionnistes professionnels.">
  <title>NutriApp — Recommandations Nutritionnelles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,500..900,40,1&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
    <script>
        // Diagnostic System Bridge
        if (window.electronAPI && window.electronAPI.onBackendLog) {
            window.electronAPI.onBackendLog((data) => {
                const styles = {
                    info: 'color: #3b82f6; font-weight: bold',
                    success: 'color: #10b981; font-weight: bold',
                    error: 'color: #ef4444; font-weight: bold; background: #fee2e2'
                };
                console.log(`%c[BACKEND-${data.type.toUpperCase()}]`, styles[data.type] || '', data.message);
            });
        }
    </script>
</head>
<body>
  <div id="app" class="app"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://unpkg.com/@otplib/preset-browser@^12.0.0/buffer.js"></script>
  <script src="https://unpkg.com/@otplib/preset-browser@^12.0.0/index.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
